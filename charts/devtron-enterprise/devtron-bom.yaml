global:
  podSecurityContext:
    fsGroup: 1000
    runAsGroup: 1000
    runAsUser: 1000
  containerSecurityContext:
    allowPrivilegeEscalation: false
    runAsUser: 1000
    runAsNonRoot: true
  containerRegistry: "quay.io/devtron"
  # The below values can be specified both at global as well as component level
  # nodeSelector:
  #   key: value
  # tolerations:
  #   - key: "key1"
  #     operator: "Equal"
  #     value: "value1"
  #     effect: "NoSchedule"
  # imagePullSecrets:
  #     - name: your-image-pull-secret
  dbConfig:
    PG_ADDR: postgresql-postgresql.devtroncd
    PG_PORT: "5432"
    PG_USER: postgres
    PG_DATABASE: orchestrator
devtron:
  installer:
    repo: "devtron-labs/charts"
    release: "48.0.0"
    registry: ""
    arch: "multi-arch"
    image: inception
    tag: 7beef376-948-31378
    source: "github" # Available options are github and gitee
  components:
    # Values for dashboard
    dashboard:
      config:
        extraConfigs:
          HIDE_DISCORD: "true"
          HIDE_RELEASES: "false"
          HIDE_RESOURCE_WATCHER: "false"
          FEATURE_SCOPED_VARIABLE_ENVIRONMENT_LIST_ENABLE: "true"
          FEATURE_IMAGE_PROMOTION_ENABLE: "true"
          FEATURE_CLUSTER_MAP_ENABLE: "true"
          FEATURE_CONFIG_DRIFT_ENABLE: "true"
      image: "dashboard:0d8f6cf4-60e17132-931-39393"
    # Values for devtron
    devtron:
      image: "hyperion:9450794d-759-39426"
      cicdImage: "devtron:9b84c8e5-930-39446"
      imagePullPolicy: IfNotPresent
      customOverrides:
        PG_ADDR: postgresql-postgresql.devtroncd
        USE_CUSTOM_HTTP_TRANSPORT: "false"
        ASYNC_BUILDX_CACHE_EXPORT: "false"
        BUILDX_CACHE_MODE_MIN: "false"
        CLONING_MODE: FULL
        SCOPED_VARIABLE_ENABLED: "true"
        SCOPED_VARIABLE_HANDLE_PRIMITIVES: "true"
        DEVTRON_CHART_ARGO_CD_INSTALL_REQUEST_TIMEOUT: "1"
        IS_INTERNAL_USE: "true"
        IS_AIR_GAP_ENVIRONMENT: "false"
        DEVTRON_MANAGED_LICENSING_ENABLED: "false"
        GRPC_ENFORCE_ALPN_ENABLED: "false"
        KRR_SCAN_LISTING_PARALLELISM_LIMIT: "2"
        KRR_SYNC_SERVICE_ACCOUNT: devtron
        KRR_DOCKER_IMAGE: "quay.io/devtron/krr:d829c010-1113-35596"
        KRR_MATRIX_TIME_RANGE: 720h
        KRR_ACTIVE_DEADLINE_SECONDS: "30000"
        HIDE_API_TOKENS: "true"
    # Values for ciRunner
    ciRunner:
      image: "ci-runner:94237c18-1020-39395"
    # Values for kubelink
    kubelink:
      image: "kubelink:94237c18-314-39417"
      imagePullPolicy: IfNotPresent
    # Values for gitsensor
    gitsensor:
      image: "git-sensor:94237c18-950-39418"
      imagePullPolicy: IfNotPresent
    chartSync:
      image: chart-sync:94237c18-1021-39419
    postgres:
      image: "postgres:14.9"
      metrics:
        image: "postgres_exporter:v0.10.1"
  # values for security integration
  security:
    imageScanner:
      image: "image-scanner:94237c18-109-39420"
      configs:
        TRIVY_DB_REPOSITORY: mirror.gcr.io/aquasec/trivy-db
        TRIVY_JAVA_DB_REPOSITORY: mirror.gcr.io/aquasec/trivy-java-db
        # values for argocd integration
  argo-cd:
    global:
      image:
        # -- If defined, a repository applied to all Argo CD deployments
        repository: quay.io/argoproj/argocd
        # -- Overrides the global Argo CD image tag whose default is the chart appVersion
        tag: "v2.13.3"
        # -- If defined, a imagePullPolicy applied to all Argo CD deployments
        imagePullPolicy: IfNotPresent
    configs:
      cm:
        create: false
      # argocd-rbac-cm
      rbac:
        create: true
        policy.default: role:admin
    applicationSet:
      replicas: 0
  monitoring:
    grafana:
      image: "grafana:7.3.1"
  devtronEnterprise:
    enabled: true
    finops:
      enabled: true
      costSync:
        image: "cost-sync:46ed7c67-1159-38183"
        schedule: "0 * * * *"
        timeZone: UTC
      timescale:
        image: "timescaledb-ha:pg18"
        volumeSize: 5Gi
    casbin:
      image: "casbin:172ef62b-9450794d-464-39422"
      imagePullPolicy: IfNotPresent
    silverSurfer:
      image: "silver-surfer:e3b9a2f6-1191-38789"
      imagePullPolicy: IfNotPresent
      podSecurityContext:
        fsGroup: 1001
        runAsGroup: 1001
        runAsUser: 1001
      containerSecurityContext:
        allowPrivilegeEscalation: false
        runAsNonRoot: true
        runAsUser: 1001
    athenaApi:
      image: "athena-api:37434600-1218-39427"
      imagePullPolicy: IfNotPresent
      healthPort: 8000
      configs:
        LLM_TEMPERATURE: "0.01"
        REDIS_URL: redis://redis.devtroncd
        PG_DATABASE: athena
    athenaMcp:
      image: "athena-mcp:37434600-1219-39428"
      imagePullPolicy: IfNotPresent
      healthPort: 8000
    scoop:
      enabled: false
      image: "scoop:94237c18-955-39423"
      imagePullPolicy: IfNotPresent
